
# 基础服务器配置
server:
  port: 8080
  servlet:
    context-path: /xxl-job-admin

# Actuator监控端点配置
management:
  server:
    servlet:
      context-path: /actuator
  health:
    mail:
      enabled: false

# Spring MVC静态资源配置
spring:
  mvc:
    servlet:
      load-on-startup: 0
    static-path-pattern: /static/**
  resources:
    static-locations: classpath:/static/

  # Freemarker模板引擎配置
  freemarker:
    templateLoaderPath: classpath:/templates/
    suffix: .ftl
    charset: UTF-8
    request-context-attribute: request
    settings:
      number_format: 0.##########

  # 数据源配置
  datasource:
    url: jdbc:mysql://172.24.20.15:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 900000
      connection-timeout: 10000
      connection-test-query: SELECT 1

  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 25
    username: xxx@qq.com
    password: xxx
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory

  # Flyway数据库迁移配置
  flyway:
    enabled: true # 开启flyway
    clean-disabled: true # 禁止清理数据表
    table: flyway_schema_history # 版本控制信息表名，默认为flyway_schema_history
    out-of-order: false # 是否允许不按顺序迁移
    baseline-on-migrate: true # 如果数据库不是空表，需要设置为true，否则启动报错
    baseline-version: 1 # 和baseline-on-migrate搭配使用，小于此版本的不执行
    # schemas: 不设置使用默认Spring连接数据的地址和数据库
    validate-on-migrate: true # 执行迁移时是否自动调用验证
    locations: classpath:migration
  # 配置数据库，flyway那边就无需再进行数据的配置了
# MyBatis配置
mybatis:
  mapper-locations: classpath:/mybatis-mapper/*Mapper.xml
  # type-aliases-package: com.xxl.job.admin.core.model

# XXL-Job调度中心配置
xxl:
  job:
    accessToken: xxl-job-admin-token
    i18n: zh_CN
    triggerpool:
      fast:
        max: 200
      slow:
        max: 100
    logretentiondays: 30

structure:
  log:
    aop:
      expression: execution(public * com.xxl.job.admin.controller..*Controller.*(..))