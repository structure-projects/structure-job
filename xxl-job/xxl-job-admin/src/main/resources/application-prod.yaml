server:
  port: 8080
  servlet:
    context-path: /xxl-job-admin
spring:
  datasource:
    username: job
    password: 8XwdAMXdAPnTbDKK
    url: jdbc:mysql://192.168.0.152:13306/job?useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      auto-commit: true
      idle-timeout: 30000
      pool-name: xxl-job-HikariCP
      max-lifetime: 900000
      connection-timeout: 10000
      connection-test-query: SELECT 1
  mail:
    host: smtp.qq.com #邮件服务器地址
    port: 25
    username: xxx@qq.com
    password: xxx
    default-encoding: UTF-8 #默认编码格式
    properties:
      mail:
        debug: false #启动debug调试
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory #SSL连接配置
  flyway:
    enabled: true # 开启flyway
    clean-disabled: true # 禁止清理数据表
    table: flyway_schema_history # 版本控制信息表名，默认为flyway_schema_history
    out-of-order: false # 是否允许不按顺序迁移
    baseline-on-migrate: true # 如果数据库不是空表，需要设置为true，否则启动报错
    baseline-version: 1 # 和baseline-on-migrate搭配使用，小于此版本的不执行
    # schemas: 不设置使用默认Spring连接数据的地址和数据库
    validate-on-migrate: true # 执行迁移时是否自动调用验证
    locations: classpath:migration
  # 配置数据库，flyway那边就无需再进行数据的配置了
  mvc:
    servlet:
      load-on-startup: 0
    static-path-pattern: /static/**
  web:
    resources:
      static-locations: classpath:/static/

  # Freemarker模板引擎配置
  freemarker:
    templateLoaderPath: classpath:/templates/
    suffix: .ftl
    charset: UTF-8
    request-context-attribute: request
    settings:
      number_format: 0.##########
#mybatis.type-aliases-package=com.xxl.job.admin.core.model

structure:
  log:
    aop:
      expression: execution(public * com.xxl.job.admin.controller..*Controller.*(..))


xxl:
  job:
    accessToken: xxl-job-admin-token
    i18n: zh_CN
    triggerpool:
      fast:
        max: 200
      slow:
        max: 100
    logretentiondays: 30

mybatis:
  mapper-locations: classpath*:mybatis-mapper/*.xml